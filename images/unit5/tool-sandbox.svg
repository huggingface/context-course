<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="250" fill="#0d1117"/>

  <!-- Outer sandbox box -->
  <rect x="20" y="20" width="460" height="210" stroke="#30363d" stroke-width="1" fill="none"/>
  <text x="35" y="35" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="12" fill="#8b949e">Sandbox</text>

  <!-- Middle workspace box -->
  <rect x="45" y="50" width="410" height="170" stroke="#30363d" stroke-width="1" fill="none"/>
  <text x="60" y="65" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="12" fill="#8b949e">Workspace</text>

  <!-- Inner safe_path box -->
  <rect x="70" y="80" width="360" height="130" stroke="#30363d" stroke-width="1" fill="none"/>
  <text x="85" y="95" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="12" fill="#8b949e">safe_path()</text>

  <!-- Content inside safe_path -->
  <text x="90" y="130" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace" font-size="11" fill="#c9d1d9">Allowed file operations</text>
</svg>
